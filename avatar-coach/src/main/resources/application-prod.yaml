spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false

app:
  oauth2:
    success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:https://dev.ai-coach.kro.kr}
  internal:
    api-key: ${INTERNAL_API_KEY:local-internal-api-key}

ai:
  server:
    base-url: ${AI_SERVER_BASE_URL}
    token: ${AI_SERVER_TOKEN}

rag:
  embedding:
    provider: ${RAG_EMBEDDING_PROVIDER:ai_worker}
    model: ${RAG_EMBEDDING_MODEL:bge-m3}
    dimensions: ${RAG_EMBEDDING_DIMENSIONS:1024}
    normalize: ${RAG_EMBEDDING_NORMALIZE:true}
    query-timeout-ms: ${RAG_EMBEDDING_QUERY_TIMEOUT_MS:5000}
    ingest-timeout-ms: ${RAG_EMBEDDING_INGEST_TIMEOUT_MS:60000}
    max-retries: ${RAG_EMBEDDING_MAX_RETRIES:2}
