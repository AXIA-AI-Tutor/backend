spring:
  application:
    name: avatar-coach

  profiles:
    default: local

  jpa:
    open-in-view: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://dev.ai-coach.kro.kr,https://ai-coach.kro.kr}

gcp:
  storage:
    enabled: ${GCS_STORAGE_ENABLED:false}
    bucket-name: ${GCS_BUCKET_NAME:avatar-coach-documents-local}
    document-prefix: ${GCS_DOCUMENT_PREFIX:documents}
    signed-url-expiration-minutes: ${GCS_SIGNED_URL_EXPIRATION_MINUTES:10}

server:
  port: ${PORT:8080}
  servlet:
    session:
      cookie:
        same-site: none
        secure: true

corpus:
  ingest-job:
    enabled: ${CORPUS_INGEST_JOB_ENABLED:false}
    artifact-uri: ${CORPUS_ARTIFACT_URI:}
    artifact-name: ${CORPUS_ARTIFACT_NAME:global-corpus}
    artifact-version: ${CORPUS_ARTIFACT_VERSION:unknown}
    artifact-variant: ${CORPUS_ARTIFACT_VARIANT:demo}
